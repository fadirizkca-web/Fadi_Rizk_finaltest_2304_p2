<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Roadmap 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <nav class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <button onclick="window.location.href='DashboardPage.html'" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 font-bold">
        <i data-lucide="arrow-left" class="h-5 w-5"></i> Dashboard
      </button>
      <div class="flex items-center gap-6">
        <div class="text-right">
          <p class="text-[10px] font-bold text-slate-400 uppercase">Total Progress</p>
          <p class="text-sm font-black text-blue-600" id="global-perc">0%</p>
        </div>
        <button onclick="logout()" class="text-red-500 hover:text-red-700 transition"><i data-lucide="log-out"></i></button>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto py-12 px-4">
    <header class="text-center mb-10">
      <h1 class="text-5xl font-black text-slate-900 mb-4 capitalize" id="header-title">Roadmap</h1>
      <div class="flex justify-center gap-3">
        <span id="label-track" class="px-4 py-1 bg-blue-600 text-white rounded-full text-xs font-black uppercase tracking-widest"></span>
        <span id="label-level" class="px-4 py-1 bg-emerald-500 text-white rounded-full text-xs font-black uppercase tracking-widest"></span>
      </div>
    </header>

    <div class="bg-white p-6 rounded-2xl shadow-xl border border-slate-200 mb-10">
      <div class="flex justify-between items-end mb-4">
        <div>
          <h2 class="text-2xl font-black text-slate-800" id="progress-perc">0%</h2>
          <p class="text-xs font-bold text-slate-400 uppercase" id="progress-label">Current Phase Progress</p>
        </div>
        <div class="h-12 w-12 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600">
          <i data-lucide="trending-up"></i>
        </div>
      </div>
      <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
        <div id="progress-bar-fill" class="bg-blue-600 h-full transition-all duration-1000" style="width: 0%"></div>
      </div>
    </div>

    <div class="flex flex-wrap md:flex-nowrap gap-2 mb-6 p-1 bg-slate-200 rounded-xl">
      <button onclick="switchTab('universal')" id="tab-universal" class="flex-1 py-3 px-4 rounded-lg font-black text-xs uppercase transition-all bg-white shadow text-blue-600">1. Universal Foundation</button>
      <button onclick="switchTab('topics')" id="tab-topics" class="flex-1 py-3 px-4 rounded-lg font-black text-xs uppercase transition-all text-slate-500 hover:text-blue-600">2. Specialization Topics</button>
      <button onclick="switchTab('tools')" id="tab-tools" class="flex-1 py-3 px-4 rounded-lg font-black text-xs uppercase transition-all text-slate-500 hover:text-blue-600">3. Essential Tools</button>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-lg overflow-hidden min-h-[400px]">
      <div id="list-container" class="divide-y divide-slate-100">
        </div>
    </div>
    
    <div class="mt-8 bg-blue-900 text-white p-6 rounded-2xl flex flex-col md:flex-row items-center justify-between gap-4">
      <div>
        <h3 class="font-black text-lg">Ready to showcase?</h3>
        <p class="text-blue-200 text-sm">Download your custom 2026 checklist.</p>
      </div>
      <button onclick="window.print()" class="bg-white text-blue-900 px-6 py-3 rounded-xl font-black text-sm flex items-center gap-2 hover:scale-105 transition">
        <i data-lucide="download" class="h-4 w-4"></i> EXPORT PDF
      </button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    let activeTab = 'universal';

    function switchTab(tab) {
      activeTab = tab;
      const tabs = ['universal', 'topics', 'tools'];
      tabs.forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if(t === tab) {
          el.className = "flex-1 py-3 px-4 rounded-lg font-black text-xs uppercase transition-all bg-white shadow text-blue-600";
        } else {
          el.className = "flex-1 py-3 px-4 rounded-lg font-black text-xs uppercase transition-all text-slate-500 hover:text-blue-600";
        }
      });
      renderAll();
    }

    function renderAll() {
      const selection = JSON.parse(localStorage.getItem('selectedPath'));
      if(!selection) return;

      let langKey = selection.lang.toLowerCase();
      if (langKey.includes('javascript')) langKey = 'javascript';
      if (langKey.includes('c#')) langKey = 'csharp';
      
      const levelKey = selection.level.toLowerCase();
      const trackKey = selection.track.toLowerCase().replace(/\s/g, '');

      // Get Data
      const db = window.roadmapDatabase;
      let currentData = [];
      
      if(activeTab === 'universal') {
        // Universal baseline shows Junior or Mid content
        currentData = (levelKey === 'junior') ? db.universal.junior : db.universal.mid;
      } else {
        const langData = db[langKey]?.[trackKey]?.[levelKey];
        currentData = langData ? langData[activeTab] : ["Data Coming Soon..."];
      }

      const progress = window.loadProgress();
      const container = document.getElementById('list-container');
      
      container.innerHTML = currentData.map((item, i) => {
        const done = progress[activeTab].includes(i);
        return `
          <div class="p-6 flex items-center justify-between hover:bg-slate-50 transition-colors group">
            <div class="flex items-center gap-4">
              <input type="checkbox" ${done ? 'checked' : ''} 
                onchange="window.toggleTask('${activeTab}', ${i}, this.checked)"
                class="w-6 h-6 rounded-md border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer transition-transform group-hover:scale-110">
              <div>
                <p class="font-bold text-slate-800 ${done ? 'line-through text-slate-400' : ''}">${item}</p>
                <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${activeTab === 'universal' ? 'Baseline' : 'Spec'}</p>
              </div>
            </div>
            <i data-lucide="${done ? 'check-circle' : 'circle'}" class="h-5 w-5 ${done ? 'text-emerald-500' : 'text-slate-200'}"></i>
          </div>
        `;
      }).join('');
      
      refreshUI(currentData.length, progress[activeTab].length);
      lucide.createIcons();
    }

    function refreshUI(total, current) {
      const perc = Math.round((current / total) * 100) || 0;
      document.getElementById('progress-perc').innerText = perc + "%";
      document.getElementById('progress-bar-fill').style.width = perc + "%";
      document.getElementById('progress-label').innerText = activeTab + " phase progress";
      
      // Calculate global
      const progress = window.loadProgress();
      const globalScore = Math.round(((progress.universal.length + progress.topics.length + progress.tools.length) / 15) * 100);
      document.getElementById('global-perc').innerText = Math.min(globalScore, 100) + "%";
    }

    window.toggleTask = (type, index, isChecked) => {
      window.saveProgress(type, index, isChecked);
      renderAll();
    };

    window.addEventListener('load', () => {
      const selection = JSON.parse(localStorage.getItem('selectedPath'));
      if(!selection) return window.location.href = 'DashboardPage.html';
      
      document.getElementById('header-title').innerText = selection.lang;
      document.getElementById('label-track').innerText = selection.track;
      document.getElementById('label-level').innerText = selection.level;
      
      renderAll();
      lucide.createIcons();
    });
  </script>
</body>
</html>
